version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ${DOCKERHUB_USERNAME}/url-shortener:latest
    container_name: url-shortener-app
    platform: linux/amd64

    depends_on:
      redis:
        condition: service_healthy

    environment:
      REDIS_HOST: redis

    ports:
      - "3000:3000"
